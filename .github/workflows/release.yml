name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify template version matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(cat .template-version | tr -d '[:space:]')
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag v$TAG does not match .template-version ($VERSION)"
            exit 1
          fi

      - name: Run CI checks reminder
        run: echo "Ensure all CI checks passed before tagging. See CHANGELOG.md."

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Generate Winget manifest stub
        run: |
          mkdir -p packaging/winget
          cat > packaging/winget/README.md << 'EOF'
          # Winget Manifest Stub

          Generate package manifests here when building native desktop binaries.
          See https://github.com/microsoft/winget-pkgs for submission guidelines.
          EOF

      - name: Generate provenance attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: sbom.cyclonedx.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            packaging/winget/README.md
            sbom.cyclonedx.json
