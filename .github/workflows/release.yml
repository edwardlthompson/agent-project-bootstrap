name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Pre-release gate (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: bash scripts/pre-release-gate.sh

      - name: Tag release lightweight gate
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(tr -d '[:space:]' < .template-version)
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag v$TAG does not match .template-version ($VERSION)"
            exit 1
          fi
          bash scripts/check-github-ci.sh HEAD

      - name: Run CI checks reminder
        run: echo "Ensure all CI checks passed before tagging. See CHANGELOG.md."

      - name: Generate root SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.20.6
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Generate web stack SBOM slice
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.20.6
        with:
          path: examples/web
          format: cyclonedx-json
          output-file: sbom-web.cyclonedx.json

      - name: Generate python stack SBOM slice
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.20.6
        with:
          path: examples/python
          format: cyclonedx-json
          output-file: sbom-python.cyclonedx.json

      - name: Generate node stack SBOM slice
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.20.6
        with:
          path: examples/node
          format: cyclonedx-json
          output-file: sbom-node.cyclonedx.json

      - name: Generate Winget manifest stub
        run: bash scripts/generate-winget-manifest.sh "AgentProjectBootstrap.Template" "$(cat .template-version | tr -d '[:space:]')"

      - name: Generate provenance attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v2.2.0
        with:
          subject-path: sbom.cyclonedx.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
          files: |
            packaging/winget/manifest.stub.yaml
            sbom.cyclonedx.json
            sbom-web.cyclonedx.json
            sbom-python.cyclonedx.json
            sbom-node.cyclonedx.json
