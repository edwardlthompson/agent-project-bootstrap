name: Dependabot auto-merge

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  dependabot:
    name: Auto-merge patch/minor Dependabot PRs
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        id: metadata
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve merge token
        id: token
        run: |
          if [ -n "${{ secrets.AUTOMERGE_TOKEN }}" ]; then
            echo "using=AUTOMERGE_TOKEN" >> "$GITHUB_OUTPUT"
            echo "note=PAT merge will trigger push workflows on main" >> "$GITHUB_OUTPUT"
          else
            echo "using=GITHUB_TOKEN" >> "$GITHUB_OUTPUT"
            echo "note=GITHUB_TOKEN merge will NOT trigger push CI; weekly health dispatches missing runs" >> "$GITHUB_OUTPUT"
          fi

      - name: Enable auto-merge for patch/minor
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.AUTOMERGE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Skip major without HUMAN label
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: |
          labels="${{ join(github.event.pull_request.labels.*.name, ',') }}"
          if echo "$labels" | grep -q 'HUMAN'; then
            gh pr merge --auto --squash "$PR_URL"
          else
            echo "Major Dependabot bumps require the HUMAN label; manual merge only"
          fi
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.AUTOMERGE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Reminder
        run: |
          echo "Merge token: ${{ steps.token.outputs.using }} — ${{ steps.token.outputs.note }}"
          echo "Dependabot auto-merge requires branch protection: CI + Dependency Review must pass before merge."
          echo "Optional: set repo secret AUTOMERGE_TOKEN (PAT with contents+workflows) so merges trigger push CI."
