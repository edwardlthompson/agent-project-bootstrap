name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
          - language: python
          - language: java-kotlin
            paths: examples/android
    steps:
      - uses: actions/checkout@v6
      - name: Initialize CodeQL (repo-wide)
        if: matrix.language != 'java-kotlin'
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
      - name: Initialize CodeQL (Android)
        if: matrix.language == 'java-kotlin'
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          paths: examples/android
      - uses: github/codeql-action/analyze@v4
