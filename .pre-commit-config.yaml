repos:
  - repo: local
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: file-encoding
        name: Check UTF-8 file encoding
        entry: bash scripts/check-file-encoding.sh
        language: system
        pass_filenames: true
        files: (\.(md|json|yml|yaml|sh|ps1|mdc|ts|tsx|toml|html|css|properties|kts|kt|xml)$|^\.gitignore$)
      - id: workflow-action-refs
        name: Check workflow action ref format
        entry: bash scripts/check-workflow-action-ref-format.sh
        language: system
        pass_filenames: false
        files: ^\.github/workflows/.*\.ya?ml$
      - id: file-limits
        name: Check file line limits
        entry: bash scripts/check-file-limits.sh
        language: system
        pass_filenames: false
      - id: validate-bootstrap-quick
        name: Quick bootstrap validation
        entry: bash scripts/validate-bootstrap.sh --quick
        language: system
        pass_filenames: false

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        files: ^examples/python/
      - id: ruff-format
        files: ^examples/python/
